name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Lint is informational until the existing error backlog is cleared;
      # remove continue-on-error once `npm run lint` is clean.
      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build
